```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            CVR Events
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="events.html">Events</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="gallery.html">Gallery</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="registration.html">Registration</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>

            </ul>

        </div>
    </div>
</nav>

<!-- Registration Form -->
<div class="container mt-5">

    <h2 class="text-center mb-4">
        Event Registration Form
    </h2>

    <form>

        <div class="mb-3">
            <label class="form-label">Student Name</label>
            <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Roll Number</label>
            <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Branch</label>
            <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mobile Number</label>
            <input type="tel" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Select Event</label>

            <select class="form-select">
                <option>Technical Quiz</option>
                <option>Hackathon</option>
                <option>Poster Presentation</option>
                <option>Coding Contest</option>
                <option>Project Expo</option>
                <option>Cultural Fest</option>
            </select>
        </div>

        <!-- Modal Button -->
        <button type="button"
                class="btn btn-success"
                data-bs-toggle="modal"
                data-bs-target="#registerModal">
            Register
        </button>

    </form>

</div>

<!-- Success Alert -->
<div class="container mt-4">
    <div class="alert alert-success">
        Registration Successful!
    </div>
</div>

<!-- Modal -->
<div class="modal fade"
     id="registerModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    Registration Confirmed
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>
            </div>

            <div class="modal-body">
                Thank you for registering for the event.
            </div>

            <div class="modal-footer">
                <button type="button"
                        class="btn btn-primary"
                        data-bs-dismiss="modal">
                    OK
                </button>
            </div>

        </div>

    </div>

</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 CVR College Event Management System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
```
